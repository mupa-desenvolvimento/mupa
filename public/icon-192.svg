<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" rx="24" fill="#0f172a"/>
  
  <!-- Terminal Icon -->
  <rect x="32" y="48" width="128" height="96" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  
  <!-- Terminal Screen -->
  <rect x="40" y="56" width="112" height="72" rx="4" fill="#000000"/>
  
  <!-- Terminal Text Lines -->
  <rect x="48" y="64" width="80" height="2" fill="#10b981"/>
  <rect x="48" y="72" width="96" height="2" fill="#10b981"/>
  <rect x="48" y="80" width="64" height="2" fill="#10b981"/>
  
  <!-- Terminal Cursor -->
  <rect x="48" y="88" width="8" height="2" fill="#10b981">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Barcode Symbol -->
  <rect x="72" y="104" width="2" height="16" fill="#64748b"/>
  <rect x="76" y="104" width="4" height="16" fill="#64748b"/>
  <rect x="82" y="104" width="2" height="16" fill="#64748b"/>
  <rect x="86" y="104" width="3" height="16" fill="#64748b"/>
  <rect x="91" y="104" width="2" height="16" fill="#64748b"/>
  <rect x="95" y="104" width="4" height="16" fill="#64748b"/>
  <rect x="101" y="104" width="2" height="16" fill="#64748b"/>
  <rect x="105" y="104" width="3" height="16" fill="#64748b"/>
  <rect x="110" y="104" width="2" height="16" fill="#64748b"/>
  <rect x="114" y="104" width="4" height="16" fill="#64748b"/>
  
  <!-- Brand Text -->
  <text x="96" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">MUPA</text>
</svg>
